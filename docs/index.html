<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Keep simple, compatible viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Flights and Vacation packages | Westjet Official Site</title>

    <!-- Optional: Google Fonts (requires internet) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- App CSS: use relative path; ensure the file exists in assets -->
    <link rel="stylesheet" href="./assets/index.css" />

    <!-- Avoid analytics/trackers inside WebView to prevent blocks -->
    <!-- Removed: GTM, Adobe Launch, Replit banner -->
    <style>
      /* Safe fallback fonts if Google Fonts blocked */
      :root {
        --font-sans: "Poppins", "Open Sans", system-ui, -apple-system, Segoe UI,
          Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji",
          "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
      }
      html, body, #root {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #ffffff;
        color: #111827;
      }
      /* Optional: hide scroll bounce artifacts in iOS */
      body {
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Prefer a non-module, self-contained bundle produced by your build -->
    <!-- Example: Vite/Rollup/Webpack output targeting IIFE/UMD -->
    <script src="./assets/index.iife.js"></script>

    <!-- If you *must* use modules, keep relative path and make sure the WebView supports it:
    <script type="module" src="./assets/index.esm.js"></script>
    -->
  </body>
</html>
