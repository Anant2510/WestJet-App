<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- WestJet Logo -->
  <defs>
    <style>
      .westjet-text { font-family: Arial, sans-serif; font-weight: bold; font-size: 32px; }
      .westjet-primary { fill: #00A0DF; }
      .westjet-accent { fill: #FFD700; }
    </style>
  </defs>
  
  <!-- Main Logo Circle with Stylized W -->
  <circle cx="25" cy="40" r="22" class="westjet-primary"/>
  
  <!-- Stylized W in circle -->
  <path d="M 15 55 L 20 30 L 25 45 L 30 30 L 35 55" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- WestJet Text -->
  <text x="50" y="48" class="westjet-text westjet-primary">WestJet</text>
  
  <!-- Optional: Small accent line -->
  <line x1="50" y1="58" x2="120" y2="58" stroke="#FFD700" stroke-width="2"/>
</svg>